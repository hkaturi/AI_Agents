name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'staging' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: |
          echo "Running tests for ${{ github.event.inputs.environment }} deployment..."
          # Replace with your actual test command, e.g.:
          # pytest tests/ -v

      - name: Deploy
        run: |
          echo "Deploying branch ${{ github.ref_name }} to ${{ github.event.inputs.environment }}..."
          # Replace with your actual deploy command, e.g.:
          # ./scripts/deploy.sh ${{ github.event.inputs.environment }}

      - name: Notify success
        if: success()
        run: echo "Deployment to ${{ github.event.inputs.environment }} succeeded!"

      - name: Notify failure
        if: failure()
        run: echo "Deployment to ${{ github.event.inputs.environment }} FAILED!"
